<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="banner">
        <div class="pattern-overlay"></div>
        <h2>🔥 Olovli Ta'm</h2>
        <p>Siz izlagan maza va sifat!</p>
        <div class="leaf leaf-1">🌿</div>
        <div class="leaf leaf-2">🍃</div>
    </div>

    <div class="category-tabs" id="category-tabs">
        <!-- Tabs dynamically generated here -->
    </div>

    <div class="products" id="products">
        <!-- JS orqali joylanadi -->
    </div>

    <div class="footer">
        <div class="social">
            <i class="fa-brands fa-instagram"></i> @foodmarket_bot
        </div>
        <div class="admin-btn" onclick="window.Telegram.WebApp.close()">
            <i class="fa-solid fa-shield-halved"></i> Admin bilan aloqa
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
